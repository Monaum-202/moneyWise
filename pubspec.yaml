name: moneywise
description: "A comprehensive Personal Finance Manager app built with Flutter."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.10.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5
  hooks_riverpod: ^2.5.1

  # Database
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  path_provider: ^2.1.5

  # Models
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Navigation
  go_router: ^14.8.1

  # Charts
  fl_chart: ^0.68.0

  # UI Components
  google_fonts: ^6.3.3
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  flex_color_scheme: ^8.4.0

  # Forms
  reactive_forms: ^17.0.1

  # Utils
  intl: ^0.20.2
  uuid: ^4.4.0
  logger: ^2.3.0
  collection: ^1.18.0

  # Security
  local_auth: ^2.3.0
  flutter_secure_storage: ^9.2.2

  # Files & Sharing
  pdf: ^3.10.11
  printing: ^5.11.1
  image_picker: ^1.1.2
  share_plus: ^9.0.0

  # Permissions
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  isar_generator: ^3.1.0+1
  riverpod_generator: ^2.4.0
  mocktail: ^1.0.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
